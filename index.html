<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gluttons Garage</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* PAGE */
.page {
    width: 100vw;
    height: 100vh;
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.8s ease;
}

/* PAGE 1 */
#page1 {
    background: #0d0d0d;
    z-index: 2;
    overflow: hidden;
    transition: background 0.8s ease;
}

/* PAGE 2 */
#page2 {
    background: #111;
    transform: translateX(100%);
    color: white;
    font-size: 30px;
}

/* LOGO */
.logo {
    width: 260px;
    z-index: 5;
    cursor: pointer;
}

/* F1 CAR (REAL LOOK USING CSS SHAPE) */
.car {
    position: absolute;
    width: 140px;
    height: 40px;
    background: red;
    border-radius: 10px 20px 20px 10px;
    left: 50%;
    top: 62%;
    transform: translate(-50%, -50%);
    opacity: 0;
    z-index: 1;
    transition: all 1s ease;
}

/* Wheels */
.car::before,
.car::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: black;
    border-radius: 50%;
    bottom: -10px;
}

.car::before {
    left: 10px;
}

.car::after {
    right: 10px;
}

/* ROAD */
.road {
    position: absolute;
    bottom: 34%;
    left: 50%;
    width: 0;
    height: 6px;
    background: #444;
    z-index: 2;
    transition: width 1s linear;
}

.road::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    top: 2px;
    background: repeating-linear-gradient(
        to right,
        white 0 20px,
        transparent 20px 40px
    );
}

/* STATES */
.show-car {
    opacity: 1;
    z-index: 6;
}

.move-car {
    left: 110%;
}

.expand-road {
    width: 70vw;
}

.bg-change {
    background: linear-gradient(90deg, #0d0d0d, #ff6600);
}

/* PAGE TRANSITION */
.slide-out {
    transform: translateX(-100%);
}

.slide-in {
    transform: translateX(0);
}
</style>
</head>

<body>

<div class="page" id="page1">

    <img src="logo.png" class="logo" id="logo">

    <div class="road" id="road"></div>

    <div class="car" id="car"></div>

</div>

<div class="page" id="page2">
    🚀 Welcome to Gluttons Garage
</div>

<script>
const logo = document.getElementById("logo");
const car = document.getElementById("car");
const road = document.getElementById("road");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");

logo.addEventListener("click", () => {

    car.classList.add("show-car");
    road.classList.add("expand-road");
    page1.classList.add("bg-change");

    setTimeout(() => {
        car.classList.add("move-car");
    }, 300);

    setTimeout(() => {
        page1.classList.add("slide-out");
        page2.classList.add("slide-in");
    }, 1300);
});
</script>

</body>
</html>
