<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gluttons Garage</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* PAGE */
.page {
    width: 100vw;
    height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.8s ease;
}

/* PAGE 1 */
#page1 {
    background: #0d0d0d;
    z-index: 2;
    overflow: hidden;
    transition: background 0.8s ease;
}

/* PAGE 2 */
#page2 {
    background: #111;
    transform: translateX(100%);
    color: white;
    font-size: 30px;
}

/* LOGO */
.logo {
    width: 260px;
    z-index: 5;
    cursor: pointer;
}

/* CAR (STARTS BEHIND LOGO) */
.car {
    position: absolute;
    width: 140px;
    left: 50%;
    top: 62%;
    transform: translate(-50%, -50%);
    opacity: 0;
    z-index: 1; /* behind logo */
    transition: all 1s ease;
}

/* ROAD (STARTS FROM CENTER → RIGHT ONLY) */
.road {
    position: absolute;
    bottom: 34%;
    left: 50%;
    width: 0;
    height: 6px;
    background: #444;
    z-index: 2;
    transition: width 1s linear;
}

.road::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    top: 2px;
    background: repeating-linear-gradient(
        to right,
        white 0 20px,
        transparent 20px 40px
    );
}

/* STATES */
.show-car {
    opacity: 1;
    z-index: 6; /* comes above logo */
}

.move-car {
    left: 110%;
}

.expand-road {
    width: 70vw; /* only right side */
}

.bg-change {
    background: linear-gradient(90deg, #0d0d0d, #ff6600);
}

/* PAGE TRANSITION */
.slide-out {
    transform: translateX(-100%);
}

.slide-in {
    transform: translateX(0);
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page" id="page1">

    <img src="logo.png" class="logo" id="logo">

    <div class="road" id="road"></div>

    <!-- PROPER RIGHT-FACING CAR -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/F1_car.svg/512px-F1_car.svg.png" class="car" id="car">

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    🚀 Welcome to Gluttons Garage
</div>

<script>
const logo = document.getElementById("logo");
const car = document.getElementById("car");
const road = document.getElementById("road");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");

logo.addEventListener("click", () => {

    // Step 1: Car appears from behind logo
    car.classList.add("show-car");

    // Step 2: Road builds to right
    road.classList.add("expand-road");

    // Step 3: Background changes
    page1.classList.add("bg-change");

    // Step 4: Car drives RIGHT
    setTimeout(() => {
        car.classList.add("move-car");
    }, 300);

    // Step 5: Page switch
    setTimeout(() => {
        page1.classList.add("slide-out");
        page2.classList.add("slide-in");
    }, 1300);
});
</script>

</body>
</html>
