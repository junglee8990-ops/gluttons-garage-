<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gluttons Garage</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* PAGE BASE */
.page {
    width: 100vw;
    height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.8s ease;
}

/* PAGE 1 */
#page1 {
    background: #0d0d0d;
    z-index: 2;
    overflow: hidden;
    transition: background 0.8s ease;
}

/* PAGE 2 */
#page2 {
    background: #111;
    transform: translateX(100%);
    color: white;
    font-size: 30px;
}

/* LOGO */
.logo {
    width: 250px;
    cursor: pointer;
    z-index: 5;
}

/* CAR */
.car {
    position: absolute;
    width: 120px;
    left: 50%;
    top: 55%;
    transform: translate(-50%, -50%) scale(0.5);
    opacity: 0;
    z-index: 4;
    transition: all 1s ease;
}

/* ROAD */
.road {
    position: absolute;
    bottom: 30%;
    width: 0%;
    height: 6px;
    background: #555;
    z-index: 3;
    transition: width 1s linear;
}

/* ROAD DASHES */
.road::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    top: 2px;
    background: repeating-linear-gradient(
        to right,
        white 0 20px,
        transparent 20px 40px
    );
}

/* ANIMATION STATES */
.show-car {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.move-car {
    left: 110%;
}

.expand-road {
    width: 120%;
}

.bg-change {
    background: linear-gradient(90deg, #0d0d0d, #ff6600);
}

/* PAGE TRANSITION */
.slide-out {
    transform: translateX(-100%);
}

.slide-in {
    transform: translateX(0);
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page" id="page1">
    <img src="logo.png" class="logo" id="logo">

    <div class="road" id="road"></div>

    <img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png" class="car" id="car">
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    🚀 Welcome to Gluttons Garage
</div>

<script>
const logo = document.getElementById("logo");
const car = document.getElementById("car");
const road = document.getElementById("road");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");

logo.addEventListener("click", () => {

    // Show car from logo
    car.classList.add("show-car");

    // Road appears
    road.classList.add("expand-road");

    // Background change
    page1.classList.add("bg-change");

    // Move car to right
    setTimeout(() => {
        car.classList.add("move-car");
    }, 200);

    // Page transition
    setTimeout(() => {
        page1.classList.add("slide-out");
        page2.classList.add("slide-in");
    }, 1200);

});
</script>

</body>
</html>
